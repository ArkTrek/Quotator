version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=prod
      - SECRET_KEY=change-me-in-production
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
