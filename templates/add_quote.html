{% extends 'base.html' %}
{% block title %}Add Quote - Quotator{% endblock %}

{% block content %}
<div class="form-container paper-element">
    <div class="form-header">
        <h2>Add a New Quote</h2>
        <p>Share an inspiring quote. Our AI will verify its safety before publishing.</p>
    </div>

    <form class="add-quote-form" method="POST" action="{{ url_for('add_quote') }}">
        <div class="form-group">
            <label for="text">Quote Text</label>
            <div class="input-wrapper">
                <textarea id="text" name="text" rows="4" placeholder="Type the quote here..." required></textarea>
            </div>
            <small class="hint">The quote will be reviewed for harmful content.</small>
        </div>
        <div class="form-group">
            <label for="author">Author</label>
            <div class="input-wrapper">
                <i class="ph ph-pen-nib"></i>
                <input type="text" id="author" name="author" placeholder="Who said this?" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2">
            <i class="ph ph-paper-plane-right"></i> Publish Quote
        </button>
    </form>
</div>
{% endblock %}
