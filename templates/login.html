{% extends 'base.html' %}
{% block title %}Login - Quotator{% endblock %}

{% block content %}
<div class="auth-container paper-element">
    <div class="auth-header">
        <h2>Welcome to Quotator</h2>
        <p>Login, register or continue as guest to start liking quotes.</p>
    </div>

    <form class="auth-form" method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
                <i class="ph ph-user"></i>
                <input type="text" id="username" name="username" placeholder="Enter your username">
            </div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <i class="ph ph-lock"></i>
                <input type="password" id="password" name="password" placeholder="Enter your password">
            </div>
        </div>

        <div class="auth-actions">
            <button type="submit" name="action" value="login" class="btn btn-primary w-100">Login</button>
            <button type="submit" name="action" value="register" class="btn btn-secondary w-100">Register</button>
        </div>

        <div class="divider">
            <span>OR</span>
        </div>

        <button type="submit" name="action" value="guest" class="btn btn-guest w-100" formnovalidate>
            <i class="ph ph-mask-happy"></i> Continue as Guest
        </button>
    </form>
</div>
{% endblock %}
